<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact genesis</title>
    <link rel="stylesheet" href="/styles/contact.css">
</head>
<body>

    <div class="website_container">

      <header class="Nav">
        <nav class="Nav_bar">
            <img class="nav_logo" src="../images/Logo.png" alt="Genesis Logo"></li>
          <ul class="Nav_bar_ul">
            <li class="Nav_bar_li"><a class="Nav_bar_a" href="pages/project.html">Projects</a></li>
            <li class="Nav_bar_li"><a class="Nav_bar_a" href="pages/conact.html">Contact</a></li>
          </ul>
        </nav> 
       </header>

       <main>
        <section class="heading">
          <div class="header_content">
            <h1 class="title">Full set of great features to make your product fresh</h1>
            <p class="header_text">Our favorite brands are our friends! We help them to achieve their goals, they help us to stay sharp.</p>
          </div> 

          <div class="forms">
             <form id="contactForm">
               <div class="forms_container">
                <form id="contactForm">
                <label for="name"></label>
                <input type="text" placeholder="Name" id="name" required>

               <label for="email"></label>
               <input type="email" placeholder="Email" id="email" required>

               <label for="regarding"></label>
               <input type="text" placeholder="Message" id="regarding" required>

              <button class="Send-btn" type="submit">Submit</button>
             </form>
          </div>
        </section>

        <section class="image">
          <div class="image_container">
            <img src="/images/Mapcontact.png" alt="Map photo">
          </div>
        </section>

         <section class="footer">
            <footer class="footer_container">
                <div class="Logo_footer"> 
                    <img src="/images/Logo.png" alt="Genesis Logo">
                </div>
                <div class="Links">
                    <a class="Navigation_footer" href="">Projects</a>
                    <a class="Navigation_footer">Contact</a>
                </div>
              <div class="Socials">
                    <img src="/images/dribbble-logo.png" alt="">
                    <img src="/images/instagram.png" alt="">
                    <img src="/images/twitter-logo-silhouette.png" alt="">
                </div>
            </footer>
        </section>


       </main>
    </div>
        
    
    
</body>
</html>
